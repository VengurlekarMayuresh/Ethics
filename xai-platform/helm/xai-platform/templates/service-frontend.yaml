apiVersion: v1
kind: Service
metadata:
  name: {{ include "xai-platform.fullname" . }}-frontend
  labels:
    {{- include "xai-platform.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "xai-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
